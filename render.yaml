services:
  - type: web
    name: ai-story-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install -g pnpm && pnpm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      # The following must be set manually in the Render Dashboard:
      # - DATABASE_URL (Your Neon connection string)
      # - GROQ_API_KEY (Your Groq API key)
      # - CORS_ORIGIN (The URL of your frontend once deployed)
